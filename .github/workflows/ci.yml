name: AI DevOps Demo Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  N8N_WEBHOOK_URL: ${{ secrets.N8N_WEBHOOK_URL }}
  APP_VERSION: ${{ github.sha }}

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Lint
  # Scenario: lint errors → AI posts fix suggestions
  # ─────────────────────────────────────────────
  lint:
    name: Code Quality (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        id: eslint
        run: |
          npm run lint 2>&1 | tee lint-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Notify n8n - Lint Result
        if: always()
        run: |
          LINT_STATUS="${{ steps.eslint.outcome }}"
          LINT_OUTPUT=$(cat lint-output.txt 2>/dev/null | head -50 || echo "No output")
          curl -s -X POST "$N8N_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"event\": \"lint_completed\",
              \"status\": \"$LINT_STATUS\",
              \"repo\": \"${{ github.repository }}\",
              \"branch\": \"${{ github.ref_name }}\",
              \"commit\": \"${{ github.sha }}\",
              \"commit_message\": \"${{ github.event.head_commit.message }}\",
              \"author\": \"${{ github.actor }}\",
              \"run_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"lint_output\": $(echo \"$LINT_OUTPUT\" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))'),
              \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }" || echo "Webhook notification failed (non-blocking)"

  # ─────────────────────────────────────────────
  # JOB 2: Unit Tests
  # Scenario: test failure → AI diagnoses and opens Issue
  # ─────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        id: unit_tests
        run: |
          npm run test:unit 2>&1 | tee unit-test-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Notify n8n - Unit Test Result
        if: always()
        run: |
          TEST_STATUS="${{ steps.unit_tests.outcome }}"
          TEST_OUTPUT=$(cat unit-test-output.txt 2>/dev/null | tail -80 || echo "No output")
          curl -s -X POST "$N8N_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"event\": \"unit_tests_completed\",
              \"status\": \"$TEST_STATUS\",
              \"repo\": \"${{ github.repository }}\",
              \"branch\": \"${{ github.ref_name }}\",
              \"commit\": \"${{ github.sha }}\",
              \"commit_message\": \"${{ github.event.head_commit.message }}\",
              \"author\": \"${{ github.actor }}\",
              \"run_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"test_output\": $(echo \"$TEST_OUTPUT\" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))'),
              \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }" || echo "Webhook notification failed (non-blocking)"

      - name: Fail job if tests failed
        if: steps.unit_tests.outcome == 'failure'
        run: exit 1

  # ─────────────────────────────────────────────
  # JOB 3: Integration Tests
  # Scenario: integration failure → AI suggests fix
  # ─────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        id: integration_tests
        run: |
          npm run test:integration 2>&1 | tee integration-test-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Notify n8n - Integration Test Result
        if: always()
        run: |
          TEST_STATUS="${{ steps.integration_tests.outcome }}"
          TEST_OUTPUT=$(cat integration-test-output.txt 2>/dev/null | tail -80 || echo "No output")
          curl -s -X POST "$N8N_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"event\": \"integration_tests_completed\",
              \"status\": \"$TEST_STATUS\",
              \"repo\": \"${{ github.repository }}\",
              \"branch\": \"${{ github.ref_name }}\",
              \"commit\": \"${{ github.sha }}\",
              \"commit_message\": \"${{ github.event.head_commit.message }}\",
              \"author\": \"${{ github.actor }}\",
              \"run_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"test_output\": $(echo \"$TEST_OUTPUT\" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))'),
              \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }" || echo "Webhook notification failed (non-blocking)"

      - name: Fail job if tests failed
        if: steps.integration_tests.outcome == 'failure'
        run: exit 1

  # ─────────────────────────────────────────────
  # JOB 4: Performance Tests
  # Scenario: slow tests → AI flags regression
  # ─────────────────────────────────────────────
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run performance tests
        id: perf_tests
        run: |
          npm run test:performance 2>&1 | tee perf-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Notify n8n - Performance Test Result
        if: always()
        run: |
          PERF_STATUS="${{ steps.perf_tests.outcome }}"
          PERF_OUTPUT=$(cat perf-output.txt 2>/dev/null | tail -50 || echo "No output")
          curl -s -X POST "$N8N_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"event\": \"performance_tests_completed\",
              \"status\": \"$PERF_STATUS\",
              \"repo\": \"${{ github.repository }}\",
              \"branch\": \"${{ github.ref_name }}\",
              \"commit\": \"${{ github.sha }}\",
              \"commit_message\": \"${{ github.event.head_commit.message }}\",
              \"author\": \"${{ github.actor }}\",
              \"run_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"perf_output\": $(echo \"$PERF_OUTPUT\" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))'),
              \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }" || echo "Webhook notification failed (non-blocking)"

  # ─────────────────────────────────────────────
  # JOB 5: Security Audit
  # Scenario: vulnerability found → AI explains risk
  # ─────────────────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        id: audit
        run: |
          npm audit --json 2>&1 | tee audit-output.json
          npm audit 2>&1 | tee audit-readable.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Notify n8n - Security Audit Result
        if: always()
        run: |
          AUDIT_STATUS="${{ steps.audit.outcome }}"
          AUDIT_OUTPUT=$(cat audit-readable.txt 2>/dev/null | head -60 || echo "No vulnerabilities found")
          curl -s -X POST "$N8N_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"event\": \"security_audit_completed\",
              \"status\": \"$AUDIT_STATUS\",
              \"repo\": \"${{ github.repository }}\",
              \"branch\": \"${{ github.ref_name }}\",
              \"commit\": \"${{ github.sha }}\",
              \"author\": \"${{ github.actor }}\",
              \"run_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"audit_output\": $(echo \"$AUDIT_OUTPUT\" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))'),
              \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }" || echo "Webhook notification failed (non-blocking)"

  # ─────────────────────────────────────────────
  # JOB 6: All Passed - Build Success
  # Scenario: everything green → AI posts summary
  # ─────────────────────────────────────────────
  build-success:
    name: Build Success Notification
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, integration-tests, performance-tests, security-audit]
    if: success()
    steps:
      - name: Notify n8n - Full Pipeline Passed
        run: |
          curl -s -X POST "$N8N_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"event\": \"pipeline_success\",
              \"status\": \"success\",
              \"repo\": \"${{ github.repository }}\",
              \"branch\": \"${{ github.ref_name }}\",
              \"commit\": \"${{ github.sha }}\",
              \"commit_message\": \"${{ github.event.head_commit.message }}\",
              \"author\": \"${{ github.actor }}\",
              \"run_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"jobs_passed\": [\"lint\", \"unit-tests\", \"integration-tests\", \"performance-tests\", \"security-audit\"],
              \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }" || echo "Webhook notification failed (non-blocking)"
