name: AI DevOps Demo Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  N8N_WEBHOOK_URL: ${{ secrets.N8N_WEBHOOK_URL }}
  APP_VERSION: ${{ github.sha }}

jobs:
  lint:
    name: Code Quality (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run ESLint and notify n8n
        run: |
          set +e
          npm run lint 2>&1 | tee lint-output.txt
          LINT_EXIT=${PIPESTATUS[0]}
          set -e

          if [ $LINT_EXIT -eq 0 ]; then
            LINT_STATUS="success"
          else
            LINT_STATUS="failure"
          fi

          LINT_OUTPUT=$(cat lint-output.txt | head -50)

          curl -s -X POST "$N8N_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"event\": \"lint_completed\",
              \"status\": \"$LINT_STATUS\",
              \"repo\": \"${{ github.repository }}\",
              \"branch\": \"${{ github.ref_name }}\",
              \"commit\": \"${{ github.sha }}\",
              \"commit_message\": \"${{ github.event.head_commit.message }}\",
              \"author\": \"${{ github.actor }}\",
              \"run_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"lint_output\": $(echo \"$LINT_OUTPUT\" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))'),
              \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }" || true

          exit $LINT_EXIT

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run unit tests and notify n8n
        run: |
          set +e
          npm run test:unit 2>&1 | tee unit-test-output.txt
          TEST_EXIT=${PIPESTATUS[0]}
          set -e

          if [ $TEST_EXIT -eq 0 ]; then
            TEST_STATUS="success"
          else
            TEST_STATUS="failure"
          fi

          TEST_OUTPUT=$(cat unit-test-output.txt | tail -80)

          curl -s -X POST "$N8N_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"event\": \"unit_tests_completed\",
              \"status\": \"$TEST_STATUS\",
              \"repo\": \"${{ github.repository }}\",
              \"branch\": \"${{ github.ref_name }}\",
              \"commit\": \"${{ github.sha }}\",
              \"commit_message\": \"${{ github.event.head_commit.message }}\",
              \"author\": \"${{ github.actor }}\",
              \"run_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"test_output\": $(echo \"$TEST_OUTPUT\" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))'),
              \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }" || true

          exit $TEST_EXIT

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run integration tests and notify n8n
        run: |
          set +e
          npm run test:integration 2>&1 | tee integration-test-output.txt
          TEST_EXIT=${PIPESTATUS[0]}
          set -e

          if [ $TEST_EXIT -eq 0 ]; then
            TEST_STATUS="success"
          else
            TEST_STATUS="failure"
          fi

          TEST_OUTPUT=$(cat integration-test-output.txt | tail -80)

          curl -s -X POST "$N8N_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"event\": \"integration_tests_completed\",
              \"status\": \"$TEST_STATUS\",
              \"repo\": \"${{ github.repository }}\",
              \"branch\": \"${{ github.ref_name }}\",
              \"commit\": \"${{ github.sha }}\",
              \"commit_message\": \"${{ github.event.head_commit.message }}\",
              \"author\": \"${{ github.actor }}\",
              \"run_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"test_output\": $(echo \"$TEST_OUTPUT\" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))'),
              \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }" || true

          exit $TEST_EXIT

  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run performance tests and notify n8n
        run: |
          set +e
          npm run test:performance 2>&1 | tee perf-output.txt
          PERF_EXIT=${PIPESTATUS[0]}
          set -e

          if [ $PERF_EXIT -eq 0 ]; then
            PERF_STATUS="success"
          else
            PERF_STATUS="failure"
          fi

          PERF_OUTPUT=$(cat perf-output.txt | tail -50)

          curl -s -X POST "$N8N_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"event\": \"performance_tests_completed\",
              \"status\": \"$PERF_STATUS\",
              \"repo\": \"${{ github.repository }}\",
              \"branch\": \"${{ github.ref_name }}\",
              \"commit\": \"${{ github.sha }}\",
              \"commit_message\": \"${{ github.event.head_commit.message }}\",
              \"author\": \"${{ github.actor }}\",
              \"run_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"perf_output\": $(echo \"$PERF_OUTPUT\" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))'),
              \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }" || true

          exit $PERF_EXIT

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run security audit and notify n8n
        run: |
          set +e
          npm audit 2>&1 | tee audit-readable.txt
          AUDIT_EXIT=$?
          set -e

          if [ $AUDIT_EXIT -eq 0 ]; then
            AUDIT_STATUS="success"
          else
            AUDIT_STATUS="failure"
          fi

          AUDIT_OUTPUT=$(cat audit-readable.txt | head -60)

          curl -s -X POST "$N8N_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"event\": \"security_audit_completed\",
              \"status\": \"$AUDIT_STATUS\",
              \"repo\": \"${{ github.repository }}\",
              \"branch\": \"${{ github.ref_name }}\",
              \"commit\": \"${{ github.sha }}\",
              \"author\": \"${{ github.actor }}\",
              \"run_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"audit_output\": $(echo \"$AUDIT_OUTPUT\" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))'),
              \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }" || true

          exit $AUDIT_EXIT

  build-success:
    name: Build Success Notification
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, integration-tests, performance-tests, security-audit]
    if: success()
    steps:
      - name: Notify n8n - Full Pipeline Passed
        run: |
          curl -s -X POST "$N8N_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"event\": \"pipeline_success\",
              \"status\": \"success\",
              \"repo\": \"${{ github.repository }}\",
              \"branch\": \"${{ github.ref_name }}\",
              \"commit\": \"${{ github.sha }}\",
              \"commit_message\": \"${{ github.event.head_commit.message }}\",
              \"author\": \"${{ github.actor }}\",
              \"run_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\",
              \"jobs_passed\": [\"lint\", \"unit-tests\", \"integration-tests\", \"performance-tests\", \"security-audit\"],
              \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }" || true
